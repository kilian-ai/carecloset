<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Categories — Care Closet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         margin: 0; background: #f7f7f7; color: #202020; }
  header { background: #fff; padding: 14px 20px; border-bottom: 1px solid #e5e5e5;
           display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.2em; margin: 0; }
  header nav { margin-left: auto; display: flex; gap: 12px; }
  header nav a { color: #555; text-decoration: none; font-size: 13px; }
  header nav a:hover { text-decoration: underline; }
  main { max-width: 900px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 18px;
          margin-bottom: 18px; }
  h2 { font-size: 14px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
       margin: 0 0 12px; color: #555; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
  th { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
  tr.dragging { opacity: 0.4; }
  .thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; background: #eee; }
  input[type="text"], input[type="file"] { font: inherit; padding: 8px 10px;
       border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
  button { font: inherit; padding: 8px 14px; border: 1px solid #ccc; background: #fff;
       border-radius: 6px; cursor: pointer; }
  button.primary { background: #172C50; color: #fff; border-color: #172C50; }
  button.danger  { color: #b00020; border-color: #d99; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 8px; align-items: center; }
  .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .add-grid { display: grid; grid-template-columns: 1fr 1fr 200px auto; gap: 10px; align-items: end; }
  label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
  .msg { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
  .msg.error { background: #fdecea; color: #b00020; }
  .msg.ok    { background: #e6f4ea; color: #137333; }
  @media (max-width: 640px) {
    .add-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>CATEGORIES</h1>
  <nav>
    <a href="/">Storefront</a>
    <a href="/inventory.html">Inventory</a>
    <a href="/admin.html">Add item</a>
  </nav>
</header>

<main>
  <div id="msg"></div>

  <div class="card">
    <h2 id="formHeading">Add category</h2>
    <div class="add-grid">
      <div>
        <label>Title (display name)</label>
        <input id="addTitle" type="text" placeholder="e.g. Hats">
      </div>
      <div>
        <label>Slug (URL, lowercase, _ separator)</label>
        <input id="addName" type="text" placeholder="hats">
      </div>
      <div>
        <label id="imageLabel">Image (optional)</label>
        <input id="addImage" type="file" accept="image/*">
        <img id="currentImage" class="thumb" style="display:none;margin-top:6px" alt="">
      </div>
      <div style="display:flex;gap:6px">
        <button id="addBtn" class="primary">Add</button>
        <button id="cancelBtn" type="button" style="display:none">Cancel</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Existing categories</h2>
    <table>
      <thead>
        <tr>
          <th style="width:80px">Image</th>
          <th>Title</th>
          <th>Slug</th>
          <th style="width:120px"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<script>
const MAX_DIM = 1400;
const $ = id => document.getElementById(id);

function showMsg(text, kind = 'ok') {
  const el = $('msg');
  el.innerHTML = '';
  if (!text) return;
  const div = document.createElement('div');
  div.className = 'msg ' + kind;
  div.textContent = text;
  el.appendChild(div);
  if (kind === 'ok') setTimeout(() => { if (el.firstChild === div) el.innerHTML = ''; }, 3000);
}

async function fileToResizedDataUrl(file) {
  if (!file) return null;
  const bitmap = await createImageBitmap(file);
  const scale = Math.min(1, MAX_DIM / Math.max(bitmap.width, bitmap.height));
  const w = Math.round(bitmap.width * scale);
  const h = Math.round(bitmap.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.85);
}

async function load() {
  const res = await fetch('/api/categories', { credentials: 'same-origin' });
  if (!res.ok) { showMsg('Failed to load categories', 'error'); return; }
  const cats = await res.json();
  window._cats = cats;
  const tbody = $('rows');
  tbody.innerHTML = '';
  for (const c of cats) {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.innerHTML = `
      <td><img class="thumb" src="${escapeAttr(c.image || '/images/shop-icon-128.png')}" alt=""></td>
      <td>${escapeHtml(c.title || '')}</td>
      <td>${escapeHtml(c.name)}</td>
      <td class="actions">
        <button data-act="delete" class="danger">Delete</button>
      </td>`;
    tr.dataset.name = c.name;
    tbody.appendChild(tr);
  }
}

let editingName = null;

function setMode(name) {
  editingName = name;
  if (!name) {
    $('formHeading').textContent = 'Add category';
    $('addBtn').textContent = 'Add';
    $('cancelBtn').style.display = 'none';
    $('addTitle').value = '';
    $('addName').value = '';
    $('addName').readOnly = false;
    $('addName').dataset.touched = '';
    $('addImage').value = '';
    $('imageLabel').textContent = 'Image (optional)';
    $('currentImage').style.display = 'none';
    $('currentImage').src = '';
  } else {
    const cat = (window._cats || []).find(c => c.name === name);
    if (!cat) return;
    $('formHeading').textContent = 'Edit category';
    $('addBtn').textContent = 'Save';
    $('cancelBtn').style.display = 'inline-block';
    $('addTitle').value = cat.title || '';
    $('addName').value = cat.name;
    $('addName').readOnly = true; // slug is permanent
    $('addName').dataset.touched = '1';
    $('addImage').value = '';
    $('imageLabel').textContent = 'Replace image (optional)';
    if (cat.image) {
      $('currentImage').src = cat.image;
      $('currentImage').style.display = 'block';
    } else {
      $('currentImage').style.display = 'none';
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function escapeAttr(s) { return escapeHtml(s); }

document.addEventListener('click', async (e) => {
  // Row click (outside buttons) -> load into form
  const tr = e.target.closest('#rows tr');
  if (tr && !e.target.closest('button')) {
    setMode(tr.dataset.name);
    return;
  }
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const rowTr = btn.closest('tr');
  const name = rowTr.dataset.name;
  const act = btn.dataset.act;
  btn.disabled = true;
  try {
    if (act === 'delete') {
      if (!confirm(`Delete category "${name}"? Only works if it has no items.`)) { btn.disabled = false; return; }
      const r = await fetch('/api/categories?name=' + encodeURIComponent(name), {
        method: 'DELETE', credentials: 'same-origin',
      });
      if (!r.ok) throw new Error((await r.json()).error || 'delete failed');
      showMsg('Deleted.', 'ok');
      if (editingName === name) setMode(null);
      load();
    }
  } catch (err) {
    showMsg(err.message || String(err), 'error');
  } finally {
    btn.disabled = false;
  }
});

$('cancelBtn').addEventListener('click', () => setMode(null));

$('addBtn').addEventListener('click', async () => {
  const title = $('addTitle').value.trim();
  const name = editingName || $('addName').value.trim().toLowerCase().replace(/[^a-z0-9_]+/g, '_').replace(/^_+|_+$/g, '');
  if (!title || !name) { showMsg('Title and slug are required.', 'error'); return; }
  $('addBtn').disabled = true;
  try {
    const file = $('addImage').files[0];
    const body = { name, title };
    if (file) body.imageDataUrl = await fileToResizedDataUrl(file);
    const method = editingName ? 'PATCH' : 'POST';
    const r = await fetch('/api/categories', {
      method,
      credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error((await r.json()).error || 'save failed');
    showMsg(editingName ? 'Saved.' : 'Added.', 'ok');
    setMode(null);
    load();
  } catch (err) {
    showMsg(err.message || String(err), 'error');
  } finally {
    $('addBtn').disabled = false;
  }
});

$('addTitle').addEventListener('input', () => {
  // Auto-fill slug from title if slug is empty
  const slug = $('addName');
  if (!slug.dataset.touched) {
    slug.value = $('addTitle').value.toLowerCase().replace(/[^a-z0-9_]+/g, '_').replace(/^_+|_+$/g, '');
  }
});
$('addName').addEventListener('input', () => { $('addName').dataset.touched = '1'; });

load();
</script>
</body>
</html>
